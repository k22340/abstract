<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Photo → Hasui Structure Mode</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    canvas { border: 1px solid #ccc; max-width: 100%; }
  </style>
</head>
<body>

  <h2>Photo → Hasui Structure Mode（巴水構造強調）</h2>
  <input type="file" id="fileInput" accept="image/*">
  <br><br>
  <canvas id="canvas"></canvas>

  <script>
    const fileInput = document.getElementById('fileInput');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const img = new Image();
      img.onload = () => {
        const maxW = 900;
        const scale = Math.min(maxW / img.width, 1);
        canvas.width = img.width * scale;
        canvas.height = img.height * scale;

        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        makeAbstract();
      };
      img.src = URL.createObjectURL(file);
    });

    function makeAbstract() {
      const w = canvas.width;
      const h = canvas.height;
      const imgData = ctx.getImageData(0, 0, w, h).data;

      const step = 10;

      const points = [];
      for (let y = 0; y <= h; y += step) {
        for (let x = 0; x <= w; x += step) {

          // 基本は揺れを弱く
          let jitterX = x + (Math.random() - 0.5) * step * 0.03;
          let jitterY = y + (Math.random() - 0.5) * step * 0.03;

          // --- 巴水構造補正 ---

          // ① 木（左右1/3）は垂直方向を強調 → x の揺れをほぼゼロに
          if (x < w * 0.33 || x > w * 0.66) {
            jitterX = x; // 垂直方向を強調
          }

          // ② 階段（中央下1/3）は台形補正 → 上辺を狭く
          if (y > h * 0.55) {
            const ratio = (y - h * 0.55) / (h * 0.45);
            jitterX = x + (x - w / 2) * ratio * 0.15;
          }

          // ③ 建物（中央）は揺れゼロ → 完全な四角形
          if (x > w * 0.33 && x < w * 0.66 && y > h * 0.3 && y < h * 0.55) {
            jitterX = x;
            jitterY = y;
          }

          points.push({
            x: Math.max(0, Math.min(w, jitterX)),
            y: Math.max(0, Math.min(h, jitterY))
          });
        }
      }

      ctx.fillStyle = '#fff';
      ctx.fillRect(0, 0, w, h);

      const cols = Math.floor(w / step) + 1;
      const rows = Math.floor(h / step) + 1;

      for (let j = 0; j < rows - 1; j++) {
        for (let i = 0; i < cols - 1; i++) {
          const p0 = points[j * cols + i];
          const p1 = points[j * cols + i + 1];
          const p2 = points[(j + 1) * cols + i];
          const p3 = points[(j + 1) * cols + i + 1];

          drawQuad(p0, p1, p3, p2, imgData, w);
        }
      }
    }

    function getAvgColor(cx, cy, w, imgData) {
      let r = 0, g = 0, b = 0;
      let count = 0;
      const sample = 14;

      for (let i = 0; i < sample; i++) {
        const sx = Math.floor(cx + (Math.random() - 0.5) * 14);
        const sy = Math.floor(cy + (Math.random() - 0.5) * 14);

        if (sx < 0 || sy < 0 || sx >= w) continue;

        const idx = (sy * w + sx) * 4;
        r += imgData[idx];
        g += imgData[idx + 1];
        b += imgData[idx + 2];
        count++;
      }

      return `rgb(${(r / count) | 0}, ${(g / count) | 0}, ${(b / count) | 0})`;
    }

    function drawQuad(p0, p1, p2, p3, imgData, w) {
      const cx = Math.floor((p0.x + p1.x + p2.x + p3.x) / 4);
      const cy = Math.floor((p0.y + p1.y + p2.y + p3.y) / 4);

      const color = getAvgColor(cx, cy, w, imgData);

      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.moveTo(p0.x, p0.y);
      ctx.lineTo(p1.x, p1.y);
      ctx.lineTo(p2.x, p2.y);
      ctx.lineTo(p3.x, p3.y);
      ctx.closePath();
      ctx.fill();
    }
  </script>

</body>
</html>
