<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Photo → Abstract (Keep Shape)</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    canvas { border: 1px solid #ccc; max-width: 100%; }
  </style>
</head>
<body>

  <h2>Photo → Abstract（原形を残す版）</h2>
  <input type="file" id="fileInput" accept="image/*">
  <br><br>
  <canvas id="canvas"></canvas>

  <script>
    const fileInput = document.getElementById('fileInput');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const img = new Image();
      img.onload = () => {
        const maxW = 900;
        const scale = Math.min(maxW / img.width, 1);
        canvas.width = img.width * scale;
        canvas.height = img.height * scale;

        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        makeAbstract();
      };
      img.src = URL.createObjectURL(file);
    });

    function makeAbstract() {
      const w = canvas.width;
      const h = canvas.height;
      const imgData = ctx.getImageData(0, 0, w, h).data;

      // 原形を残すために細かめ
      const step = 18;

      // グリッド点を作る
      const points = [];
      for (let y = 0; y <= h; y += step) {
        for (let x = 0; x <= w; x += step) {

          // 揺れを弱くして原形を残す
          const jitterX = x + (Math.random() - 0.5) * step * 0.12;
          const jitterY = y + (Math.random() - 0.5) * step * 0.12;

          points.push({
            x: Math.max(0, Math.min(w, jitterX)),
            y: Math.max(0, Math.min(h, jitterY))
          });
        }
      }

      // 背景を白でクリア
      ctx.fillStyle = '#fff';
      ctx.fillRect(0, 0, w, h);

      const cols = Math.floor(w / step) + 1;
      const rows = Math.floor(h / step) + 1;

      for (let j = 0; j < rows - 1; j++) {
        for (let i = 0; i < cols - 1; i++) {
          const p0 = points[j * cols + i];
          const p1 = points[j * cols + i + 1];
          const p2 = points[(j + 1) * cols + i];
          const p3 = points[(j + 1) * cols + i + 1];

          drawTriangle(p0, p1, p2, imgData, w);
          drawTriangle(p2, p1, p3, imgData, w);
        }
      }
    }

    // 三角形の平均色を取る（原形を残すために安定）
    function getAvgColor(cx, cy, w, imgData) {
      let r = 0, g = 0, b = 0;
      let count = 0;
      const sample = 7;

      for (let i = 0; i < sample; i++) {
        const sx = Math.floor(cx + (Math.random() - 0.5) * 10);
        const sy = Math.floor(cy + (Math.random() - 0.5) * 10);

        if (sx < 0 || sy < 0 || sx >= w) continue;

        const idx = (sy * w + sx) * 4;
        r += imgData[idx];
        g += imgData[idx + 1];
        b += imgData[idx + 2];
        count++;
      }

      return `rgb(${(r / count) | 0}, ${(g / count) | 0}, ${(b / count) | 0})`;
    }

    function drawTriangle(p0, p1, p2, imgData, w) {
      const cx = Math.floor((p0.x + p1.x + p2.x) / 3);
      const cy = Math.floor((p0.y + p1.y + p2.y) / 3);

      const color = getAvgColor(cx, cy, w, imgData);

      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.moveTo(p0.x, p0.y);
      ctx.lineTo(p1.x, p1.y);
      ctx.lineTo(p2.x, p2.y);
      ctx.closePath();
      ctx.fill();
    }
  </script>

</body>
</html>
